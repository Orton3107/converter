<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> <meta name="apple-mobile-web-app-title" content="Конвертер"> <meta name="theme-color" content="#0a0e27"> <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"> <link rel="icon" type="image/png" href="icons/icon-192.png"> <link rel="manifest" href="manifest.json"> <title>Конвертер валют</title> <link rel="stylesheet" href="style.css"> <!-- Supabase SDK для фронтенда --> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> </head> <body> <div class="app"> <header class="header"> <h1>Конвертер валют</h1> <div class="update-info"> <span id="lastUpdate">—</span> <button id="refreshBtn" class="refresh-btn" aria-label="Обновить курсы"> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <polyline points="23 4 23 10 17 10"></polyline> <polyline points="1 20 1 14 7 14"></polyline> <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path> </svg> </button> </div> </header> <main class="main"> <section class="from-section"> <label class="section-label" for="amount">Сумма</label> <div class="input-row"> <input type="number" id="amount" inputmode="decimal" placeholder="0" value="100" autocomplete="off"> <select id="fromCurrency" class="currency-select"> <option value="UAH">₴ Гривна</option> <option value="MDL">L Молдавский лей</option> <option value="EUR">€ Евро</option> <option value="USD">$ Доллар</option> </select> </div> </section> <div class="swap-arrow"> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <line x1="12" y1="5" x2="12" y2="19"></line> <polyline points="19 12 12 19 5 12"></polyline> </svg> </div> <section class="to-section"> <label class="section-label">Результат</label> <div id="results" class="results-list"> <!-- Результаты заполняются JS --> </div> <div class="target-currency-toggle"> <label class="section-label small">Показывать валюты:</label> <div class="toggle-chips"> <label class="chip"><input type="checkbox" value="UAH" checked> <span>₴ UAH</span></label> <label class="chip"><input type="checkbox" value="MDL" checked> <span>L MDL</span></label> <label class="chip"><input type="checkbox" value="EUR" checked> <span>€ EUR</span></label> <label class="chip"><input type="checkbox" value="USD" checked> <span>$ USD</span></label> </div> </div> </section> </main> <div id="statusMessage" class="status-message"></div> </div> <script src="app.js"></script> </body> </html>
